name: Deployment smoke tests

on:
  deployment_status:

jobs:
  smoke:
    if: ${{ github.event.deployment_status.state == 'success' && github.event.deployment_status.target_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Run deployment smoke tests
        env:
          SMOKE_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: node scripts/smoke-test-deployment.mjs
