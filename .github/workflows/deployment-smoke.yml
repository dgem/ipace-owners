name: Deployment smoke tests

on:
  deployment_status:

jobs:
  smoke:
    if: >-
      ${{
        github.event.deployment_status.state == 'success' &&
        github.event.deployment_status.target_url != '' &&
        (
          contains(github.event.deployment_status.target_url, 'ipace-owners.org') ||
          contains(github.event.deployment_status.target_url, '.web.app') ||
          contains(github.event.deployment_status.target_url, '.firebaseapp.com')
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Run deployment smoke tests
        env:
          SMOKE_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: make smoke
