name: GCP Firebase production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: firebase-production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-go@v7
        with:
          go-version-file: functions/firebase-go/go.mod
          cache-dependency-path: functions/firebase-go/go.sum

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: make ci-install

      - name: Lint source
        run: make lint

      - name: Test site
        run: make test-node

      - name: Test Go functions
        run: make test-go

      - name: Build site
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY_PRODUCTION }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN_PRODUCTION }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID_PRODUCTION }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET_PRODUCTION }}
        run: make build

      - id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PRODUCTION }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_PRODUCTION }}
          create_credentials_file: true
          export_environment_variables: true
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - name: Verify GCP deployment credentials
        run: gcloud auth print-access-token >/dev/null

      - name: Detect backend deploy changes
        id: backend
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          printf '%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(functions/firebase-go/.*|firebase\.json|Makefile|scripts/write-functions-env\.mjs|\.github/workflows/gcp-firebase-production\.yml)$'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Go Cloud Functions
        if: steps.backend.outputs.deploy == 'true'
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID_PRODUCTION }}
          GCP_REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
          FUNCTIONS_SERVICE_ACCOUNT: ${{ secrets.GCP_FUNCTIONS_SERVICE_ACCOUNT_PRODUCTION }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY_PRODUCTION }}
          VIN_PEPPER: ${{ secrets.VIN_PEPPER_PRODUCTION }}
          SNAPSHOT_BUCKET: ${{ vars.SNAPSHOT_BUCKET_PRODUCTION }}
          CAMPAIGN_MEDIA_BUCKET: ${{ vars.CAMPAIGN_MEDIA_BUCKET_PRODUCTION }}
          VEO_LOCATION: ${{ vars.VEO_LOCATION_PRODUCTION }}
          VEO_MODEL_ID: ${{ vars.VEO_MODEL_ID_PRODUCTION }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS_PRODUCTION }}
          FIREBASE_EMAIL_CONTINUE_URL: ${{ vars.FIREBASE_EMAIL_CONTINUE_URL_PRODUCTION }}
          FIREBASE_EMAIL_LINK_DOMAIN: ${{ vars.FIREBASE_EMAIL_LINK_DOMAIN_PRODUCTION }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_PRODUCTION }}
          RESEND_FROM: ${{ vars.RESEND_FROM_PRODUCTION }}
          RESEND_REPLY_TO: ${{ vars.RESEND_REPLY_TO_PRODUCTION }}
          RESEND_ASSET_BASE_URL: ${{ vars.RESEND_ASSET_BASE_URL_PRODUCTION }}
          INSTAGRAM_ACCESS_TOKEN_SECRET: ${{ vars.INSTAGRAM_ACCESS_TOKEN_SECRET_PRODUCTION }}
          INSTAGRAM_USER_ID: ${{ vars.INSTAGRAM_USER_ID_PRODUCTION }}
          INSTAGRAM_GRAPH_API_VERSION: ${{ vars.INSTAGRAM_GRAPH_API_VERSION_PRODUCTION }}
          INSTAGRAM_MEDIA_BASE_URL: https://ipace-owners.org
        run: make deploy-functions

      - name: Deploy Firebase Hosting production
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          FIREBASE_CLI_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: make deploy-hosting-production

      - name: Smoke test production
        env:
          SMOKE_BASE_URL: https://ipace-owners.org
        run: make smoke
