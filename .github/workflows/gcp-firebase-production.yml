name: GCP Firebase production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-go@v6
        with:
          go-version-file: functions/firebase-go/go.mod
          cache-dependency-path: functions/firebase-go/go.sum

      - name: Install dependencies
        run: make ci-install

      - name: Test site
        run: make test-node

      - name: Test Go functions
        run: make test-go

      - name: Build site
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY_PRODUCTION }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN_PRODUCTION }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID_PRODUCTION }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET_PRODUCTION }}
        run: make build

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PRODUCTION }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_PRODUCTION }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy Go Cloud Functions
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
          FUNCTIONS_SERVICE_ACCOUNT: ${{ secrets.GCP_FUNCTIONS_SERVICE_ACCOUNT_PRODUCTION }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY_PRODUCTION }}
          VIN_PEPPER: ${{ secrets.VIN_PEPPER_PRODUCTION }}
          SNAPSHOT_BUCKET: ${{ vars.SNAPSHOT_BUCKET_PRODUCTION }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS_PRODUCTION }}
          FIREBASE_EMAIL_CONTINUE_URL: ${{ vars.FIREBASE_EMAIL_CONTINUE_URL_PRODUCTION }}
          FIREBASE_EMAIL_LINK_DOMAIN: ${{ vars.FIREBASE_EMAIL_LINK_DOMAIN_PRODUCTION }}
        run: make deploy-functions

      - name: Deploy Firebase Hosting production
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_PRODUCTION_PROJECT_ID }}
        run: make deploy-hosting-production

      - name: Smoke test production
        env:
          SMOKE_BASE_URL: https://ipace-owners.org
        run: make smoke
