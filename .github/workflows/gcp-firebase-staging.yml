name: GCP Firebase staging

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-go@v7
        with:
          go-version-file: functions/firebase-go/go.mod
          cache-dependency-path: functions/firebase-go/go.sum

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: make ci-install

      - name: Lint source
        run: make lint

      - name: Test site
        run: make test-node

      - name: Test Go functions
        run: make test-go

      - name: Build site without deployment credentials
        run: make build

      - name: Check rendered desktop and mobile states
        env:
          VISUAL_BASE_URL: http://127.0.0.1:8080
        run: |
          npm run dev -- --port=8080 > /tmp/ipace-visual-server.log 2>&1 &
          make test-visual

      - name: Upload visual checkpoints
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rendered-admin-checkpoints
          path: visual-artifacts/
          if-no-files-found: error

  deploy-preview:
    needs: validate
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: firebase-staging-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-go@v7
        with:
          go-version-file: functions/firebase-go/go.mod
          cache-dependency-path: functions/firebase-go/go.sum

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2
        with:
          tofu_wrapper: false

      - name: Install dependencies
        run: make ci-install

      - name: Build site
        env:
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY_STAGING }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN_STAGING }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_STAGING_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID_STAGING }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET_STAGING }}
        run: make build

      - id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.FIREBASE_STAGING_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_STAGING }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_STAGING }}
          create_credentials_file: true
          export_environment_variables: true
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - name: Verify GCP deployment credentials
        run: gcloud auth print-access-token >/dev/null

      - name: Deploy Firebase Hosting preview
        id: hosting
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_STAGING_PROJECT_ID }}
          CHANNEL_ID: pr-${{ github.event.pull_request.number }}
          FIREBASE_CLI_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: make deploy-hosting-preview

      - name: Authorize Firebase Hosting preview for passwordless sign-in
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_STAGING_PROJECT_ID }}
          FIREBASE_PREVIEW_URL: ${{ steps.hosting.outputs.url }}
        run: make authorize-preview-domain

      - name: Detect backend deploy changes
        id: backend
        run: |
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          printf '%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eq '^(functions/firebase-go/.*|firebase\.json|Makefile|scripts/write-functions-env\.mjs|\.github/workflows/gcp-firebase-staging\.yml)$'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Go Cloud Functions
        if: steps.backend.outputs.deploy == 'true'
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_STAGING_PROJECT_ID }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_STAGING_PROJECT_ID }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID_STAGING }}
          GCP_REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
          FUNCTIONS_SERVICE_ACCOUNT: ${{ secrets.GCP_FUNCTIONS_SERVICE_ACCOUNT_STAGING }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY_STAGING }}
          VIN_PEPPER: ${{ secrets.VIN_PEPPER_STAGING }}
          SNAPSHOT_BUCKET: ${{ vars.SNAPSHOT_BUCKET_STAGING }}
          CAMPAIGN_MEDIA_BUCKET: ${{ vars.CAMPAIGN_MEDIA_BUCKET_STAGING }}
          VEO_LOCATION: ${{ vars.VEO_LOCATION_STAGING }}
          VEO_MODEL_ID: ${{ vars.VEO_MODEL_ID_STAGING }}
          ALLOWED_ORIGINS: ${{ steps.hosting.outputs.url }}
          FIREBASE_EMAIL_CONTINUE_URL: ${{ format('{0}/account/', steps.hosting.outputs.url) }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_STAGING }}
          RESEND_FROM: ${{ vars.RESEND_FROM_STAGING }}
          RESEND_REPLY_TO: ${{ vars.RESEND_REPLY_TO_STAGING }}
          RESEND_ASSET_BASE_URL: ${{ vars.RESEND_ASSET_BASE_URL_STAGING }}
          INSTAGRAM_ACCESS_TOKEN_SECRET: ${{ vars.INSTAGRAM_ACCESS_TOKEN_SECRET_STAGING }}
          INSTAGRAM_USER_ID: ${{ vars.INSTAGRAM_USER_ID_STAGING }}
          INSTAGRAM_GRAPH_API_VERSION: ${{ vars.INSTAGRAM_GRAPH_API_VERSION_STAGING }}
          INSTAGRAM_MEDIA_BASE_URL: ${{ steps.hosting.outputs.url }}
        run: make deploy-functions

      - name: Refresh Firebase Hosting preview with current Function revisions
        if: steps.backend.outputs.deploy == 'true'
        env:
          GCP_PROJECT_ID: ${{ vars.FIREBASE_STAGING_PROJECT_ID }}
          CHANNEL_ID: pr-${{ github.event.pull_request.number }}
          FIREBASE_CLI_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
        run: make deploy-hosting-preview

      - name: Smoke test preview
        env:
          SMOKE_BASE_URL: ${{ steps.hosting.outputs.url }}
        run: make smoke

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.hosting.outputs.url }}
          docker_name: ghcr.io/zaproxy/zaproxy:2.17.0
          rules_file_name: .zap/rules.tsv
          cmd_options: -m 3
          fail_action: true
          allow_issue_writing: false
          artifact_name: zap-baseline-report

      - name: Comment preview details
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = 'Firebase staging deploy finished.';
            let deployFailed = false;
            if (fs.existsSync('firebase-preview.json')) {
              const deployJson = fs.readFileSync('firebase-preview.json', 'utf8');
              body += '\n\n```json\n' + deployJson.slice(0, 4000) + '\n```';
              try {
                deployFailed = JSON.parse(deployJson).status === 'error';
              } catch {
                deployFailed = true;
              }
            }
            if (deployFailed && fs.existsSync('firebase-preview-error.log')) {
              const diagnostics = fs.readFileSync('firebase-preview-error.log', 'utf8').slice(-6000);
              if (diagnostics.trim()) {
                body += '\n\n<details><summary>Firebase CLI diagnostics</summary>\n\n```text\n' + diagnostics + '\n```\n</details>';
              }
            }
            if (deployFailed && fs.existsSync('firebase-debug.log')) {
              const debugLog = fs.readFileSync('firebase-debug.log', 'utf8').slice(-6000);
              if (debugLog.trim()) {
                body += '\n\n<details><summary>Firebase debug log</summary>\n\n```text\n' + debugLog + '\n```\n</details>';
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
