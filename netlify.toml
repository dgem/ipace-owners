[build]
  command     = "npm run build"
  publish     = "_site"
  functions   = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command     = "npm run dev:eleventy"
  targetPort  = 8080
  port        = 8888
  publish     = "_site"
  functions   = "netlify/functions"

# Redirect all 404s to a sensible page
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    # CSP: allow Netlify Identity and self
    Content-Security-Policy   = "default-src 'self'; script-src 'self' https://identity.netlify.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.netlify.com https://*.netlify.app; frame-src https://netlify-cdp-loader.netlify.app;"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
