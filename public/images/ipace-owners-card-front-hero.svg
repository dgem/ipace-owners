<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" role="img" aria-labelledby="title desc">
  <title id="title">I-PACE owners advocacy card front using the website hero image</title>
  <desc id="desc">Invitation for owners affected by H447 or H570 battery issues, with a dark electric SUV, QR code and joining call to action.</desc>
  <defs>
    <linearGradient id="hero-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b263b" stop-opacity=".94"/>
      <stop offset=".48" stop-color="#0b263b" stop-opacity=".58"/>
      <stop offset=".78" stop-color="#0b263b" stop-opacity=".08"/>
    </linearGradient>
    <linearGradient id="footer-shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b263b" stop-opacity=".72"/>
      <stop offset="1" stop-color="#071a28" stop-opacity=".96"/>
    </linearGradient>
    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity=".6"/>
    </filter>
    <clipPath id="card-clip">
      <rect width="850" height="550" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card-clip)">
    <rect width="850" height="550" fill="#16364d"/>
    <image href="ipace-hero.png" x="-115" y="0" width="1056" height="550" preserveAspectRatio="none"/>
    <rect width="850" height="550" fill="url(#hero-shade)"/>
    <rect y="388" width="850" height="162" fill="url(#footer-shade)"/>

    <rect x="36" y="35" width="187" height="34" rx="17" fill="#0f766e"/>
    <text x="129.5" y="58" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.4">I-PACE OWNERS</text>

    <g fill="#fff" font-family="Arial, Helvetica, sans-serif" filter="url(#text-shadow)">
      <text x="36" y="130" font-size="51" font-weight="800" font-style="italic">H447/H570</text>
      <text x="36" y="181" font-size="42" font-weight="700" font-style="italic">Battery issues?</text>
    </g>

    <g>
      <rect x="678" y="31" width="140" height="140" rx="9" fill="#fff"/>
      <image href="ipace-owners-qr.svg" x="684" y="37" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <g fill="#fff" font-family="Arial, Helvetica, sans-serif" filter="url(#text-shadow)">
      <text x="36" y="438" font-size="31" font-weight="700">Join us to help get a fair deal for all.</text>
      <text x="36" y="483" font-size="22" font-weight="600">Free to join. It takes less than a minute.</text>
      <text x="36" y="520" fill="#5eead4" font-size="25" font-weight="700">iPace-Owners.org</text>
    </g>
  </g>

  <rect x="7" y="7" width="836" height="536" rx="14" fill="none" stroke="#fff" stroke-opacity=".78" stroke-width="2"/>
</svg>
